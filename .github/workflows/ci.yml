name: CMake Build

permissions:
  contents: write
  actions: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows-x64-release:
    name: Build - Windows x64 (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 18 2026" -A x64

      - name: Build with CMake
        run: cmake --build build --config Release

      - name: Upload Windows x64 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          path: build/Release

  build-windows-x86-release:
    name: Build - Windows x86 (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 18 2026" -A Win32

      - name: Build with CMake
        run: cmake --build build --config Release

      - name: Upload Windows x86 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86-release
          path: build/Release

  build-windows-arm64-release:
    name: Build - Windows ARM64 (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 18 2026" -A ARM64

      - name: Build with CMake
        run: cmake --build build --config Release

      - name: Upload Windows ARM64 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-release
          path: build/Release

  build-linux-x64-release:
    name: Build - Linux x64 (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libfontconfig1-dev \
            libopenal-dev \
            libvulkan-dev \
            libwayland-dev \
            libegl1-mesa-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build with CMake
        run: cmake --build build --parallel $(nproc)

      - name: Upload Linux x64 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-release
          path: build

  build-freebsd-x64-release:
    name: Build - FreeBSD x64 (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake ninja sdl3 sdl3_ttf openal-soft bullet
          run: |
            cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
            cmake --build build

      - name: Upload FreeBSD x64 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-x64-release
          path: build

  create-release:
    name: Create Release
    needs:
      - build-windows-x64-release
      - build-windows-x86-release
      - build-windows-arm64-release
      - build-linux-x64-release
      - build-freebsd-x64-release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows x64 Release
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-release
          path: artifacts/windows-x64

      - name: Download Windows x86 Release
        uses: actions/download-artifact@v4
        with:
          name: windows-x86-release
          path: artifacts/windows-x86

      - name: Download Windows ARM64 Release
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64-release
          path: artifacts/windows-arm64

      - name: Download Linux x64 Release
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-release
          path: artifacts/linux-x64

      - name: Download FreeBSD x64 Release
        uses: actions/download-artifact@v4
        with:
          name: freebsd-x64-release
          path: artifacts/freebsd-x64

      - name: Prepare release folders
        run: |
          mkdir -p release/windows-x64
          mkdir -p release/windows-x86
          mkdir -p release/windows-arm64
          mkdir -p release/linux-x64
          mkdir -p release/freebsd-x64

      - name: Copy Game Template
        run: |
          cp -r Game_Template/* release/windows-x64/
          cp -r Game_Template/* release/windows-x86/
          cp -r Game_Template/* release/windows-arm64/
          cp -r Game_Template/* release/linux-x64/
          cp -r Game_Template/* release/freebsd-x64/

      - name: Merge build artifacts
        run: |
          cp -r artifacts/windows-x64/* release/windows-x64/
          cp -r artifacts/windows-x86/* release/windows-x86/
          cp -r artifacts/windows-arm64/* release/windows-arm64/
          cp -r artifacts/windows-x64/shaders release/windows-arm64/
          cp -r artifacts/linux-x64/* release/linux-x64/
          cp -r artifacts/freebsd-x64/* release/freebsd-x64/

      - name: Create archives
        run: |
          cd release
          zip -r windows-x64.zip windows-x64
          zip -r windows-x86.zip windows-x86
          zip -r windows-arm64.zip windows-arm64
          zip -r linux-x64.zip linux-x64
          zip -r freebsd-x64.zip freebsd-x64

      - name: Recreate release tag
        run: |
          git tag -f automated-release
          git push origin automated-release --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: automated-release
          name: Automated Release
          body: |
            Build Date: ${{ github.event.head_commit.timestamp }}
          files: |
            release/windows-x64.zip
            release/windows-x86.zip
            release/windows-arm64.zip
            release/linux-x64.zip
            release/freebsd-x64.zip