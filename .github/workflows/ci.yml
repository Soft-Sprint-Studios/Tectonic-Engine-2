name: CMake Build

permissions:
  contents: write
  actions: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows-x64-release:
    name: Build - Windows x64 (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build with CMake
        run: cmake --build build --config Release

      - name: Upload Windows x64 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          path: build/Release

  build-windows-x64-relwithdebinfo:
    name: Build - Windows x64 (RelWithDebInfo)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build with CMake
        run: cmake --build build --config RelWithDebInfo

      - name: Upload Windows x64 RelWithDebInfo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-relwithdebinfo
          path: build/RelWithDebInfo

  build-windows-x86-release:
    name: Build - Windows x86 (Release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A Win32

      - name: Build with CMake
        run: cmake --build build --config Release

      - name: Upload Windows x86 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86-release
          path: build/Release

  build-windows-x86-relwithdebinfo:
    name: Build - Windows x86 (RelWithDebInfo)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A Win32

      - name: Build with CMake
        run: cmake --build build --config RelWithDebInfo

      - name: Upload Windows x86 RelWithDebInfo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86-relwithdebinfo
          path: build/RelWithDebInfo

  build-linux-x64-release:
    name: Build - Linux x64 (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxft-dev \
            libxrender-dev \
            libxfixes-dev \
            libxcursor-dev \
            libfontconfig1-dev \
            libopenal-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build with CMake
        run: cmake --build build --parallel $(nproc)

      - name: Upload Linux x64 Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-release
          path: build

  build-linux-x64-relwithdebinfo:
    name: Build - Linux x64 (RelWithDebInfo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxft-dev \
            libxrender-dev \
            libxfixes-dev \
            libxcursor-dev \
            libfontconfig1-dev \
            libopenal-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build with CMake
        run: cmake --build build --parallel $(nproc)

      - name: Upload Linux x64 RelWithDebInfo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-relwithdebinfo
          path: build

  create-release:
    name: Create Release
    needs:
      - build-windows-x64-release
      - build-windows-x86-release
      - build-linux-x64-release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows x64 Release
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-release
          path: artifacts/windows-x64

      - name: Download Windows x86 Release
        uses: actions/download-artifact@v4
        with:
          name: windows-x86-release
          path: artifacts/windows-x86

      - name: Download Linux x64 Release
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-release
          path: artifacts/linux-x64

      - name: Prepare release folders
        run: |
          mkdir -p release/windows-x64
          mkdir -p release/windows-x86
          mkdir -p release/linux-x64

      - name: Copy Game Template
        run: |
          cp -r Game_Template/* release/windows-x64/
          cp -r Game_Template/* release/windows-x86/
          cp -r Game_Template/* release/linux-x64/

      - name: Merge build artifacts
        run: |
          cp -r artifacts/windows-x64/* release/windows-x64/
          cp -r artifacts/windows-x86/* release/windows-x86/
          cp -r artifacts/linux-x64/* release/linux-x64/

      - name: Create archives
        run: |
          cd release
          zip -r windows-x64.zip windows-x64
          zip -r windows-x86.zip windows-x86
          zip -r linux-x64.zip linux-x64

      - name: Recreate release tag
        run: |
          git tag -f automated-release
          git push origin automated-release --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: automated-release
          name: Automated Release
          body: |
            Build Date: ${{ github.event.head_commit.timestamp }}
          files: |
            release/windows-x64.zip
            release/windows-x86.zip
            release/linux-x64.zip